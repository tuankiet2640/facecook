name: Build and Test

on:
  push:
    branches: [ main, dev1 ]
  pull_request:
    branches: [ main, dev1 ]

jobs:
  compose:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Run tests
        run: docker compose exec -T app cargo test --workspace --verbose

      - name: Shutdown
        if: always()
        run: docker compose down
``
